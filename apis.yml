aid: samsara
name: Samsara
description: 'Samsara is a leading connected operations platform for physical operations
  industries including transportation, logistics, construction, field services, and
  energy. The Samsara REST API provides programmatic access to fleet telematics, driver
  safety, compliance (ELD/HOS), vehicle diagnostics, route management, industrial
  IoT sensors, and workforce management. With over two million connected devices,
  the platform offers real-time GPS tracking, AI-powered safety cameras, digital inspection
  forms (DVIRs), IFTA reporting, and data streaming via webhooks and Kafka. Base URL:
  https://api.samsara.com. Authentication uses Bearer tokens with OAuth 2.0 support.'
