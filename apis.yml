    name: Samsara API
    description: >-
      The Samsara REST API provides comprehensive access to fleet and industrial
      IoT data including vehicles, drivers, assets, routes, compliance (ELD/HOS),
      safety events, sensor readings, DVIR inspections, documents, forms,
      addresses, tags, users, and messaging. Supports real-time data, historical
      queries, webhooks, and Kafka data streaming.
